<!DOCTYPE html>
<html>
<head>
<title>Election Results</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color: #f4f9ff;
    text-align: center;
}

h1{
    color: #b30000;
}

table{
    margin: auto;
    border-collapse: collapse;
    width: 50%;
    background-color: white;
}

th{
    background-color: #228B22;
    color: white;
    padding: 10px;
}

td{
    padding: 10px;
    text-align: center;
}

tr:nth-child(even){
    background-color: #f2f2f2;
}

tr:hover{
    background-color: #d6f5d6;
}

a{
    display: inline-block;
    margin-top: 20px;
    padding: 10px 15px;
    background-color: #0066cc;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}

a:hover{
    background-color: #004999;
}

</style>

</head>
<body>

<h1>Election Results</h1>

<table border="1">

<tr>
<th>Candidate</th>
<th>Votes</th>
</tr>

<tr>
<td>Candidate A</td>
<td>To be known after voting is done</td>
</tr>

<tr>
<td>Candidate B</td>
<td>To be known after voting is done</td>
</tr>

</table>

<br>

</body>
</html>
